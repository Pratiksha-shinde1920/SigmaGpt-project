services:
  - type: web
    name: sigmagpt-backend
    runtime: node
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && npm start
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "8080"
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://sigmagpt-frontend.onrender.com"

  - type: web
    name: sigmagpt-frontend
    runtime: node
    buildCommand: cd Frontend && npm install && npm run build
    startCommand: cd Frontend && npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: "https://sigmagpt-backend.onrender.com/api"
